<html>
    <head>
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <p id="home-counter" class="counter">0</p>
                <div class="button-panel">
                    <button class="score-button" onclick="add1PointToHome()">+1</button>
                    <button class="score-button" onclick="add2PointsToHome()">+2</button>
                    <button class="score-button" onclick="add3PointsToHome()">+3</button>
                </div>
            </div>
            <div>
                <h3>GUEST</h3>
                <p id="guest-counter" class="counter">0</p>
                <div class="button-panel">
                    <button class="score-button" onclick="add1PointToGuest()">+1</button>
                    <button class="score-button" onclick="add2PointsToGuest()">+2</button>
                    <button class="score-button" onclick="add3PointsToGuest()">+3</button>
                </div>
            </div>
        </div>
        <button id="new-game-button" onclick="newGame()">NEW GAME</button>
        <script src="index.js"></script>
    </body>
</html>
